<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse Pick Guide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#E8620A;--ord:#7A3305;
  --yw:#F5C800;--ywh:#FFE840;--ywd:#4a3800;
  --bg:#141c28;--pb:#111820;--tx:#dde3ec;--gn:#00e676;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--tx);
  font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
#app{display:grid;grid-template-rows:50px 1fr 50px;
  grid-template-columns:270px 1fr;height:100vh}
#hd{grid-column:1/3;background:#0a1220;border-bottom:2px solid var(--yw);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px}
#hd h1{font-size:.95rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--yw)}
#hr{display:flex;align-items:center;gap:10px;font-size:.75rem}
#sd{width:8px;height:8px;border-radius:50%;background:var(--gn);
  box-shadow:0 0 8px 2px rgba(0,230,118,.7)}
#lu{color:#445;font-size:.68rem}
.hb{background:#182435;border:1px solid #2a3a55;color:var(--yw);
  padding:4px 10px;border-radius:4px;font-size:.7rem;cursor:pointer}
.hb:hover{background:#203050;border-color:var(--yw)}
#pc{background:var(--pb);border-right:1px solid #1c2e48;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:8px 4px;gap:6px}
.pl{font-size:.6rem;font-weight:700;letter-spacing:.15em;
  text-transform:uppercase;color:#445}
#pr{background:#0d151f;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:6px 8px;overflow:hidden}
#ft{grid-column:1/3;background:#080f18;border-top:2px solid #1a2840;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;gap:12px}
#fl{color:#334;font-size:.68rem;white-space:nowrap}
#fm{flex:1;text-align:center;font-size:.8rem;font-weight:600;
  color:var(--yw);letter-spacing:.03em}
#fx{color:#445;font-size:.65rem;white-space:nowrap;text-align:right}
#csv{width:100%;max-width:246px;height:auto}
.cf{fill:none;stroke:var(--or);stroke-width:5;stroke-linejoin:round}
.cd{stroke:#5a2800;stroke-width:2.5}
.cs{stroke:#242424;stroke-width:1;stroke-dasharray:3 3}
.cg{fill:#181818;stroke:#222;stroke-width:1}
.cn{font-family:'Segoe UI',Arial,sans-serif;font-size:22px;font-weight:900;
  fill:var(--or);text-anchor:middle;dominant-baseline:central;pointer-events:none}
.cb{font-family:'Segoe UI',Arial,sans-serif;font-size:6px;fill:#3a2010;
  text-anchor:middle;dominant-baseline:central;pointer-events:none}
.cw{fill:#111;stroke:var(--or);stroke-width:2.5}
.ch{fill:var(--ord)}
.ck{fill:#1a1a1a;stroke:var(--or);stroke-width:1.5}
#rsv{width:100%;height:auto;display:block}
.RL{stroke:var(--yw);stroke-width:6;stroke-linecap:round;fill:none}
.RB{stroke:var(--yw);stroke-width:4.5;stroke-linecap:round;fill:none}
.RX{stroke:var(--ywd);stroke-width:1.5;stroke-dasharray:6 4;fill:none}
.RR{stroke:#1e1e1e;stroke-width:1.2;fill:none}
.RS{fill:#080e18;stroke:#111a28;stroke-width:1}
.RS.on{fill:rgba(245,200,0,.16);stroke:var(--ywh);stroke-width:2.5;
  animation:rg 1.4s ease-in-out infinite}
@keyframes rg{
  0%,100%{filter:drop-shadow(0 0 8px rgba(245,200,0,.8))}
  50%{filter:drop-shadow(0 0 20px rgba(245,200,0,1))}
}
.RR{stroke:#1e1e1e;stroke-width:1.2;fill:none}
.SL{font-family:'Segoe UI',Arial,sans-serif;font-size:9px;
  fill:#1a2e42;font-weight:700;text-anchor:middle;
  dominant-baseline:central;pointer-events:none}
.SL.on{fill:rgba(245,200,0,.55)}
.SC{font-family:'Segoe UI',Arial,sans-serif;font-size:8px;font-weight:700;
  fill:var(--yw);text-anchor:middle;dominant-baseline:central;
  letter-spacing:.08em;opacity:.45;pointer-events:none}
.BC{fill:var(--or);stroke:#000;stroke-width:1.5}
.BT{font-family:'Segoe UI',Arial,sans-serif;font-size:8px;font-weight:900;
  fill:#fff;text-anchor:middle;dominant-baseline:central;pointer-events:none}
</style>

function drawBadges(slotNum,cartNums){
  const g=GEO[slotNum];if(!g)return;
  const layer=document.getElementById('badge-layer');
  const R=9,PAD=4,GAP=2,STEP=R*2+GAP;
  const baseX=g.x+g.w-PAD-R;const baseY=g.y+PAD+R;
  cartNums.forEach((num,i)=>{
    const cx=baseX-i*STEP;if(cx<g.x+R)return;
    const grp=document.createElementNS(NS,'g');
    const circle=mkEl('circle',{class:'BC',cx,cy:baseY,r:R});
    const text=mkEl('text',{class:'BT',x:cx,y:baseY});
    text.textContent=num;grp.appendChild(circle);grp.appendChild(text);layer.appendChild(grp);
  });
}
function applyCartItems(cartItems){
  clearRack();if(!cartItems||!cartItems.length)return;
  const map={};
  cartItems.forEach((item,idx)=>{
    if(!item||!item.rackSlots)return;const cn=idx+1;
    item.rackSlots.forEach(rn=>{const k=Number(rn);if(!map[k])map[k]=[];if(!map[k].includes(cn))map[k].push(cn);});
  });
  Object.entries(map).forEach(([rn,nums])=>{
    const n=Number(rn);
    const s=document.getElementById('s'+n);const l=document.getElementById('l'+n);
    if(s)s.classList.add('on');if(l)l.classList.add('on');drawBadges(n,nums);
  });
  const hasPicks=Object.keys(map).length>0;
  document.getElementById('fm').textContent=hasPicks?'Pick from highlighted sections  place in numbered cart slots':'No active picks';
  document.getElementById('fx').textContent=cartItems.map((it,i)=>it?`${i+1}:${it.description}`:null).filter(Boolean).join('  ;  ');
}
const DEMOS=[
  [{description:'Black Front',rackSlots:[1,30]},{description:'Black Rear',rackSlots:[2,30]},{description:'Grey Front',rackSlots:[9,30]},{description:'Grey Rear',rackSlots:[10,30]},{description:'Orange Front',rackSlots:[13,30]},{description:'Orange Rear',rackSlots:[14,30]},{description:'White Front',rackSlots:[21,30]},{description:'White Rear',rackSlots:[22,30]}],
  [{description:'Panel A',rackSlots:[17,37]},{description:'Panel B',rackSlots:[18,37]},{description:'Panel C',rackSlots:[19,38]},{description:'Panel D',rackSlots:[20,38]},{description:'Panel E',rackSlots:[25,37]},{description:'Panel F',rackSlots:[26,37]},{description:'Panel G',rackSlots:[27,38]},{description:'Panel H',rackSlots:[28,38]}],
  [{description:'Door Liner 1',rackSlots:[3,29]},{description:'Door Liner 2',rackSlots:[4,29]},{description:'Door Liner 3',rackSlots:[5,29]},{description:'Door Liner 4',rackSlots:[6,29]},{description:'Door Liner 5',rackSlots:[7,29]},{description:'Door Liner 6',rackSlots:[8,29]},{description:'Door Liner 7',rackSlots:[11,29]},{description:'Door Liner 8',rackSlots:[12,29]}],
  [{description:'Armrest Black',rackSlots:[32,33]},{description:'Armrest Black',rackSlots:[32,33]},{description:'Armrest Grey',rackSlots:[34,35]},{description:'Armrest Grey',rackSlots:[34,36]},null,null,null,null]
];
let demoIdx=-1;
function cycleDemo(){demoIdx=(demoIdx+1)%DEMOS.length;applyCartItems(DEMOS[demoIdx]);document.getElementById('lu').textContent=`Demo ${demoIdx+1}/${DEMOS.length} ; ${new Date().toLocaleTimeString()}`;}
const CFG={apiEndpoint:'/api/cart-items',pollMs:5000,useMock:true};
async function poll(){
  if(CFG.useMock)return;
  try{const r=await fetch(CFG.apiEndpoint,{headers:{Accept:'application/json'}});if(!r.ok)throw new Error('HTTP '+r.status);applyCartItems(await r.json());document.getElementById('lu').textContent='Polled: '+new Date().toLocaleTimeString();}
  catch(e){console.error('Fetch:',e);}
}
document.getElementById('demoBtn').addEventListener('click',cycleDemo);
document.getElementById('clrBtn').addEventListener('click',()=>{demoIdx=-1;clearRack();document.getElementById('lu').textContent=';';});
poll();setInterval(poll,CFG.pollMs);
})();
</script>
