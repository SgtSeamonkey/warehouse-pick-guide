<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Door Line RH Side Kitting Pick Guide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#E8620A;--ord:#7A3305;
  --yw:#F5C800;--ywh:#FFE840;--ywd:#4a3800;
  --bg:#141c28;--pb:#111820;--tx:#dde3ec;--gn:#00e676;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--tx);
  font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
#app{display:grid;grid-template-rows:50px 1fr 50px;
  grid-template-columns:1fr;height:100vh}
#hd{grid-column:1/-1;background:#0a1220;border-bottom:2px solid var(--yw);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px}
#hd h1{font-size:.95rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--yw)}
#hr{display:flex;align-items:center;gap:10px;font-size:.75rem}
#sd{width:8px;height:8px;border-radius:50%;background:var(--gn);
  box-shadow:0 0 8px 2px rgba(0,230,118,.7)}
#lu{color:#445;font-size:.68rem}
.hb{background:#182435;border:1px solid #2a3a55;color:var(--yw);
  padding:4px 10px;border-radius:4px;font-size:.7rem;cursor:pointer}
.hb:hover{background:#203050;border-color:var(--yw)}
#pr{background:#0d151f;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:6px 8px;overflow:hidden}
#ft{grid-column:1/-1;background:#080f18;border-top:2px solid #1a2840;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;gap:12px}
#fl{color:#334;font-size:.68rem;white-space:nowrap}
#fm{flex:1;text-align:center;font-size:.8rem;font-weight:600;
  color:var(--yw);letter-spacing:.03em}
#fx{color:#445;font-size:.65rem;white-space:nowrap;text-align:right}
.cf{fill:none;stroke:var(--or);stroke-width:5;stroke-linejoin:round}
.cd{stroke:#5a2800;stroke-width:2.5}
.cs{stroke:#242424;stroke-width:1;stroke-dasharray:3 3}
.cg{fill:#181818;stroke:#222;stroke-width:1}
.cn{font-family:'Segoe UI',Arial,sans-serif;font-size:22px;font-weight:900;
  fill:var(--or);text-anchor:middle;dominant-baseline:central;pointer-events:none}
.cb{font-family:'Segoe UI',Arial,sans-serif;font-size:6px;fill:#3a2010;
  text-anchor:middle;dominant-baseline:central;pointer-events:none}
.cw{fill:#111;stroke:var(--or);stroke-width:2.5}
.ch{fill:var(--ord)}
.ck{fill:#1a1a1a;stroke:var(--or);stroke-width:1.5}
#rsv{width:100%;height:auto;display:block}
.RF{fill:rgba(20,28,42,.55);stroke:var(--yw);stroke-width:3;stroke-linejoin:round}
.RS{fill:#0c1824;stroke:#263a52;stroke-width:1.5}
.RS.on{fill:rgba(245,200,0,.18);stroke:var(--ywh);stroke-width:2.5;
  animation:rg 1.4s ease-in-out infinite}
@keyframes rg{
  0%,100%{filter:drop-shadow(0 0 8px rgba(245,200,0,.8))}
  50%{filter:drop-shadow(0 0 20px rgba(245,200,0,1))}
}
/* SN = rack section number (small, top-left of each cell) */
.SN{font-family:'Segoe UI',Arial,sans-serif;fill:#304a66;font-weight:900;
  text-anchor:start;dominant-baseline:auto;pointer-events:none}
.SN.on{fill:rgba(245,200,0,.7)}
/* SP = part number text inside rack cell */
.SP{font-family:'Segoe UI',Arial,sans-serif;fill:#3a6e9a;font-weight:400;
  text-anchor:middle;dominant-baseline:central;pointer-events:none;font-style:italic}
.SP.on{fill:rgba(240,180,0,.82)}
/* SD = part description text inside rack cell */
.SD{font-family:'Segoe UI',Arial,sans-serif;fill:#26506e;font-weight:700;
  text-anchor:middle;dominant-baseline:central;pointer-events:none}
.SD.on{fill:rgba(245,200,0,.95)}
/* CPT/CDT = part number / description inside orange cart slots */
.CPT{font-family:'Segoe UI',Arial,sans-serif;fill:#b04515;font-weight:700;
  text-anchor:middle;dominant-baseline:central;pointer-events:none}
.CDT{font-family:'Segoe UI',Arial,sans-serif;fill:#7a3820;font-weight:500;
  text-anchor:middle;dominant-baseline:central;pointer-events:none;font-style:italic}
.CPT.on{fill:rgba(245,200,0,.9)}.CDT.on{fill:rgba(240,175,0,.75)}
/* Edit modal */
#edit-modal{position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000}
#edit-modal .modal-body{background:#1a2540;border:2px solid var(--yw);border-radius:8px;
  padding:20px;min-width:340px;max-width:90vw;color:var(--tx)}
#edit-modal h2{margin:0 0 12px;font-size:1rem;color:var(--yw)}
#edit-modal label{display:block;margin:8px 0 2px;font-size:.75rem;color:#8899aa}
#edit-modal input[type="text"],
#edit-modal input[type="number"]{width:100%;padding:6px 8px;border:1px solid #2a3a55;
  border-radius:4px;background:#0d151f;color:var(--tx);font-size:.85rem}
#edit-modal input[type="file"]{margin:4px 0;font-size:.75rem;color:var(--tx)}
#edit-modal .img-preview{max-width:100%;max-height:120px;margin:6px 0;border:1px solid #2a3a55;border-radius:4px}
#edit-modal .btn-row{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
#edit-modal .btn{padding:6px 16px;border:none;border-radius:4px;font-size:.8rem;cursor:pointer}
#edit-modal .btn-save{background:var(--yw);color:#1a2540;font-weight:700}
#edit-modal .btn-cancel{background:#2a3a55;color:var(--tx)}
#edit-modal .btn-remove{background:#6a2020;color:#fff;font-size:.7rem}
#edit-modal .btn-reset{background:#6a4020;color:#fff;font-size:.7rem}
.dim-row{display:flex;gap:8px}
.dim-row>div{flex:1}
/* Slot picker modal */
#slot-picker{position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000}
#slot-picker .modal-body{background:#1a2540;border:2px solid var(--yw);border-radius:8px;
  padding:20px;min-width:340px;max-width:90vw;max-height:80vh;color:var(--tx);overflow-y:auto}
#slot-picker h2{margin:0 0 12px;font-size:1rem;color:var(--yw)}
#slot-picker .slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px}
#slot-picker .slot-btn{padding:8px 4px;border:1px solid #2a3a55;border-radius:4px;
  background:#0d151f;color:var(--tx);font-size:.8rem;cursor:pointer;text-align:center}
#slot-picker .slot-btn:hover{background:#203050;border-color:var(--yw)}
#slot-picker .slot-btn.zero{border-color:#6a2020;color:#ff6666}
#slot-picker .sp-close{margin-top:12px;padding:6px 16px;border:none;border-radius:4px;
  font-size:.8rem;cursor:pointer;background:#2a3a55;color:var(--tx)}
</style>
</head>

  34:{x:1152,y:263,w:140,h:168},
  35:{x:1222,y:263,w:0,h:0},
  36:{x:1152,y:347,w:0,h:0},
  37:{x:1222,y:347,w:0,h:0},
  38:{x:1152,y:431,w:140,h:84},
  39:{x:1222,y:431,w:0,h:0}
};
/* Snapshot of original GEO values so slots can be reset to defaults */
const DEFAULT_GEO={};
Object.keys(GEO).forEach(k=>{DEFAULT_GEO[k]={x:GEO[k].x,y:GEO[k].y,w:GEO[k].w,h:GEO[k].h};});
const ALL=Object.keys(GEO).map(Number);
const NS='http://www.w3.org/2000/svg';
const MAX_TEXT_LEN=30;   // max characters displayed per label
const MIN_FONT_SIZE=4;   // smallest font-size (px) fitText will shrink to
const FONT_SHRINK_STEP=0.4; // px decrement per fitText iteration
const BADGE_RADIUS=10;   // px radius of cart-slot number badges
const BADGE_PADDING=4;   // px from edge of section to badge centre
const BADGE_GAP=3;       // px gap between adjacent badges
const MIN_BADGE_R=4;     // smallest badge radius when auto-shrinking

/* ---- Persistence -------------------------------------------------- */
const STORAGE_KEY='warehouse-pick-RH';
const RACK_IMAGES={};
(function loadSaved(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;
    const saved=JSON.parse(raw);
    if(saved.parts){
      Object.entries(saved.parts).forEach(([k,v])=>{
        const n=Number(k);
        if(RACK_PARTS[n]){
          if(v.p!==undefined)RACK_PARTS[n].p=v.p;
          if(v.d!==undefined)RACK_PARTS[n].d=v.d;
        }
      });
    }
    if(saved.geo){
      Object.entries(saved.geo).forEach(([k,v])=>{
        const n=Number(k);
        if(GEO[n]){
          if(v.w!==undefined)GEO[n].w=v.w;
          if(v.h!==undefined)GEO[n].h=v.h;
        }
      });
    }
    if(saved.images){
      Object.entries(saved.images).forEach(([k,v])=>{RACK_IMAGES[Number(k)]=v;});
    }
  }catch(e){console.warn('load error',e);}
})();
function saveToStorage(){
  try{
    const data={parts:{},geo:{},images:{}};
    ALL.forEach(n=>{
      data.parts[n]={p:(RACK_PARTS[n]||{}).p||'',d:(RACK_PARTS[n]||{}).d||''};
      data.geo[n]={w:GEO[n].w,h:GEO[n].h};
      if(RACK_IMAGES[n])data.images[n]=RACK_IMAGES[n];
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  }catch(e){console.warn('save error',e);}
}

function mkEl(tag,a){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(a))e.setAttribute(k,v);
  return e;
}

/** Shrink font-size of an SVG text element until it fits within maxW pixels. */
function fitText(el, maxW) {
  if (typeof el.getComputedTextLength !== 'function') return;
  let sz = parseFloat(el.getAttribute('font-size')) || 10;
  while (sz > MIN_FONT_SIZE && el.getComputedTextLength() > maxW) {
    sz = Math.max(MIN_FONT_SIZE, sz - FONT_SHRINK_STEP);
    el.setAttribute('font-size', sz.toFixed(1));
  }
}

/** Dynamically create all rack cell rects and text elements from GEO. */
function generateRackCells(){
  const container=document.getElementById('rack-cells');
  const NARROW_W=90;
  const LABEL_X=5;
  const LABEL_Y=12;
  const MIN_TEXT_GAP = 10;
  const BOTTOM_PAD   = 6;
  const frag = document.createDocumentFragment();
  ALL.forEach(n => {
    const g = GEO[n];
    const narrow = g.w < NARROW_W;
    const fs  = narrow ? 9  : 10;
    const pfs = narrow ? 8  : 10;
    const dfs = narrow ? 10 : 12;
    const descY = Math.min(g.y + g.h * 0.89, g.y + g.h - BOTTOM_PAD);
    const partY = Math.min(g.y + g.h * 0.75, descY - MIN_TEXT_GAP);
    // Cell rect
    frag.appendChild(mkEl('rect', {id:'s'+n, class:'RS', x:g.x, y:g.y, width:g.w, height:g.h}));
    // Image element (populated by renderRackImages)
    frag.appendChild(mkEl('image', {id:'img'+n, x:g.x+1, y:g.y+1,
      width:Math.max(0,g.w-2), height:Math.max(0,g.h-2),
      preserveAspectRatio:'xMidYMid meet', 'pointer-events':'none'}));
    // Section number label (top-left)
    const lbl = mkEl('text', {id:'l'+n, class:'SN', x:g.x+LABEL_X, y:g.y+LABEL_Y, 'font-size':fs});
    lbl.textContent = n;
    frag.appendChild(lbl);
    // Part number text (bottom area)
    frag.appendChild(mkEl('text', {id:'p'+n, class:'SP', x:g.x+g.w/2, y:partY, 'font-size':pfs}));
    // Description text (bottom area, below part)
    frag.appendChild(mkEl('text', {id:'d'+n, class:'SD', x:g.x+g.w/2, y:descY, 'font-size':dfs}));
  });
  container.appendChild(frag);
}

/** Populate part-number and description text into every rack section. */
function renderRackLabels(){
  ALL.forEach(n=>{
    const g=GEO[n];
    const rp=RACK_PARTS[n]||{p:'',d:''};
    const pel=document.getElementById('p'+n);
    const del_=document.getElementById('d'+n);
    if(pel){
      pel.textContent=String(rp.p).slice(0,MAX_TEXT_LEN);
      fitText(pel,g.w-8);
    }
    if(del_){
      del_.textContent=String(rp.d).slice(0,MAX_TEXT_LEN);
      fitText(del_,g.w-8);
    }
  });
}

/** Populate part-number and description text into every orange cart slot (vertical). */
function renderCartLabels(){
  const SLOT_W=50,SLOT_H=158,NUM_H=35;
  const AVAIL=SLOT_H-NUM_H-5;
  const COL_P=0.30,COL_D=0.70;
  const P_FS=15,D_FS=12;
  const SLOT_POS={1:{col:3,row:1},2:{col:3,row:0},3:{col:2,row:1},4:{col:2,row:0},5:{col:1,row:1},6:{col:1,row:0},7:{col:0,row:1},8:{col:0,row:0}};
  for(let s=1;s<=8;s++){
    const op=ORANGE_PARTS[s]||{p:'',d:''};
    const sp=SLOT_POS[s];
    const col=sp.col;
    const sx=14+col*56;
    const sy=sp.row===0?14:178;
    const pel=document.getElementById('cp'+s);
    const del_=document.getElementById('cd'+s);
    if(pel){
      pel.textContent=String(op.p).slice(0,MAX_TEXT_LEN);
      const px=sx+SLOT_W*COL_P;
      const py=sy+NUM_H+AVAIL/2;
      pel.setAttribute('x',px);
      pel.setAttribute('y',py);
      pel.setAttribute('font-size',P_FS);
      pel.setAttribute('transform','rotate(90,'+px+','+py+')');
      fitText(pel,AVAIL);
    }
    if(del_){
      del_.textContent=String(op.d).slice(0,MAX_TEXT_LEN);
      const dx=sx+SLOT_W*COL_D;
      const dy=sy+NUM_H+AVAIL/2;
      del_.setAttribute('x',dx);
      del_.setAttribute('y',dy);
      del_.setAttribute('font-size',D_FS);
      del_.setAttribute('transform','rotate(90,'+dx+','+dy+')');
      fitText(del_,AVAIL);
    }
  }
}

/** Draw orange cart-slot number badges on an illuminated rack section. */
function drawBadges(slotNum,cartNums){
  const g=GEO[slotNum];if(!g)return;
  const layer=document.getElementById('badge-layer');
  const sorted=[...cartNums].sort((a,b)=>a-b);
  const count=sorted.length;if(!count)return;
  // Compute badge radius: start at standard, shrink if needed to fit all badges
  let R=BADGE_RADIUS,GAP=BADGE_GAP,PAD=BADGE_PADDING;
  for(let i=0;i<20&&R>MIN_BADGE_R;i++){
    const step=R*2+GAP;
    const pR=Math.max(1,Math.floor((g.w-PAD*2+GAP)/step));
    const rows=Math.ceil(count/pR);
    if(PAD*2+rows*R*2+(rows-1)*GAP<=g.h) break;
    R-=0.5;GAP=BADGE_GAP*(R/BADGE_RADIUS);PAD=BADGE_PADDING*(R/BADGE_RADIUS);
  }
  const STEP=R*2+GAP;
  const usableW=g.w-PAD*2;
  const perRow=Math.max(1,Math.floor((usableW+GAP)/STEP));
  sorted.forEach((num,i)=>{
    const col=i%perRow;
    const row=Math.floor(i/perRow);
    const rowStart=row*perRow;
    const inThisRow=Math.min(perRow,count-rowStart);
    const rowWidth=inThisRow*R*2+(inThisRow-1)*GAP;
    const rowStartX=g.x+(g.w-rowWidth)/2+R;
    const cx=rowStartX+col*STEP;
    const cy=g.y+PAD+R+row*STEP;
    if(cy+R>g.y+g.h)return;
    const grp=document.createElementNS(NS,'g');
    const sw=Math.max(0.8,1.5*(R/BADGE_RADIUS));
    const circle=mkEl('circle',{fill:'#E8620A',stroke:'#000','stroke-width':sw.toFixed(1),cx,cy,r:R});
    const fs=Math.max(5,Math.round(9*(R/BADGE_RADIUS)));
    const text=mkEl('text',{'font-family':'Arial,sans-serif','font-size':fs,'font-weight':'900',fill:'#fff','text-anchor':'middle','dominant-baseline':'central','pointer-events':'none',x:cx,y:cy});
    text.textContent=num;grp.appendChild(circle);grp.appendChild(text);layer.appendChild(grp);
  });
}

/** Apply active highlights and badges from PICK_ROUTES. */
function applyPickRoutes(){
  // Clear all active states
  ALL.forEach(n=>{
    ['s','l','p','d'].forEach(pfx=>{
      const el=document.getElementById(pfx+n);
      if(el)el.classList.remove('on');
    });
  });
  const bl=document.getElementById('badge-layer');
  if(bl)bl.innerHTML='';

  // Build section→[cartSlots] reverse map
  const map={};
  for(const[slot,racks]of Object.entries(PICK_ROUTES)){
    racks.forEach(rn=>{
      const k=Number(rn);
      if(!map[k])map[k]=[];
      if(!map[k].includes(Number(slot)))map[k].push(Number(slot));
    });
  }

  Object.entries(map).forEach(([rn,slots])=>{
    const n=Number(rn);
    ['s','l','p','d'].forEach(pfx=>{
      const el=document.getElementById(pfx+n);
      if(el)el.classList.add('on');
    });
    drawBadges(n,slots);
  });

  // Footer status
  const activeSlots=Object.keys(PICK_ROUTES).map(Number).filter(s=>{
    const r=PICK_ROUTES[s];return r&&r.length>0;
  });
  document.getElementById('fm').textContent=
    activeSlots.length>0
      ?'Pick from highlighted sections — place parts in numbered cart slots'
      :'No active picks configured';

  const partList=Object.keys(ORANGE_PARTS).map(s=>{
    const op=ORANGE_PARTS[s];
    return op&&op.p?s+':'+op.p:null;
  }).filter(Boolean).join(' · ');
  document.getElementById('fx').textContent=partList;
}

/** Populate rack slot images from RACK_IMAGES. */
function renderRackImages(){
  ALL.forEach(n=>{
    const imgEl=document.getElementById('img'+n);
    if(!imgEl)return;
    const src=RACK_IMAGES[n]||'';
    if(src){
      imgEl.setAttribute('href',src);
    }else{
      imgEl.removeAttribute('href');
    }
  });
}

/** Make rack cells clickable for editing. */
function setupClickHandlers(){
  ALL.forEach(n=>{
    const cell=document.getElementById('s'+n);
    if(cell){cell.style.cursor='pointer';cell.addEventListener('click',()=>openEditModal(n));}
  });
}

/* ---- Edit modal --------------------------------------------------- */
let currentEditSlot=null;
let modalMouseDownOnBackdrop=false;

function openEditModal(n){
  currentEditSlot=n;
  const g=GEO[n];
  const rp=RACK_PARTS[n]||{p:'',d:''};
  document.getElementById('em-slot').textContent=n;
  document.getElementById('em-part').value=rp.p||'';
  document.getElementById('em-desc').value=rp.d||'';
  document.getElementById('em-w').value=g.w;
  document.getElementById('em-h').value=g.h;
  const preview=document.getElementById('em-preview');
  const rmBtn=document.getElementById('em-rm-img');
  if(RACK_IMAGES[n]){preview.src=RACK_IMAGES[n];preview.style.display='block';rmBtn.style.display='inline-block';}
  else{preview.style.display='none';rmBtn.style.display='none';}
  document.getElementById('em-img').value='';
  document.getElementById('edit-modal').style.display='flex';
}

function closeEditModal(){
  document.getElementById('edit-modal').style.display='none';
  currentEditSlot=null;
}

function saveEditModal(){
  if(currentEditSlot===null)return;
  const n=currentEditSlot;
  if(!RACK_PARTS[n])RACK_PARTS[n]={p:'',d:''};
  RACK_PARTS[n].p=document.getElementById('em-part').value.slice(0,MAX_TEXT_LEN);
  RACK_PARTS[n].d=document.getElementById('em-desc').value.slice(0,MAX_TEXT_LEN);
  GEO[n].w=Math.max(0,parseInt(document.getElementById('em-w').value)||0);
  GEO[n].h=Math.max(0,parseInt(document.getElementById('em-h').value)||0);
  saveToStorage();
  fullRerender();
  closeEditModal();
}

function resetSlotToDefault(){
  if(currentEditSlot===null)return;
  const n=currentEditSlot;
  const def=DEFAULT_GEO[n];
  if(def){
    document.getElementById('em-w').value=def.w;
    document.getElementById('em-h').value=def.h;
  }
}

function handleImageUpload(e){
  const file=e.target.files&&e.target.files[0];
  if(!file||currentEditSlot===null)return;
  const reader=new FileReader();
  reader.onload=function(evt){
    RACK_IMAGES[currentEditSlot]=evt.target.result;
    const preview=document.getElementById('em-preview');
    preview.src=evt.target.result;
    preview.style.display='block';
    document.getElementById('em-rm-img').style.display='inline-block';
  };
  reader.readAsDataURL(file);
}

function removeImage(){
  if(currentEditSlot===null)return;
  delete RACK_IMAGES[currentEditSlot];
  document.getElementById('em-preview').style.display='none';
  document.getElementById('em-rm-img').style.display='none';
}

/* ---- Slot picker -------------------------------------------------- */
function openSlotPicker(){
  const grid=document.getElementById('sp-grid');
  grid.innerHTML='';
  ALL.forEach(n=>{
    const btn=document.createElement('button');
    btn.className='slot-btn';
    const g=GEO[n];
    if(g.w===0||g.h===0)btn.classList.add('zero');
    btn.textContent=n;
    btn.addEventListener('click',()=>{closeSlotPicker();openEditModal(n);});
    grid.appendChild(btn);
  });
  document.getElementById('slot-picker').style.display='flex';
}
function closeSlotPicker(){
  document.getElementById('slot-picker').style.display='none';
}

/* ---- Export / Import ----------------------------------------------- */
function exportSettings(){
  const data={parts:{},geo:{},images:{}};
  ALL.forEach(n=>{
    data.parts[n]={p:(RACK_PARTS[n]||{}).p||'',d:(RACK_PARTS[n]||{}).d||''};
    data.geo[n]={w:GEO[n].w,h:GEO[n].h};
    if(RACK_IMAGES[n])data.images[n]=RACK_IMAGES[n];
  });
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=STORAGE_KEY+'-settings.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function importSettings(e){
  const file=e.target.files&&e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(evt){
    try{
      const saved=JSON.parse(evt.target.result);
      if(saved.parts){
        Object.entries(saved.parts).forEach(([k,v])=>{
          const n=Number(k);
          if(RACK_PARTS[n]){
            if(v.p!==undefined)RACK_PARTS[n].p=v.p;
            if(v.d!==undefined)RACK_PARTS[n].d=v.d;
          }
        });
      }
      if(saved.geo){
        Object.entries(saved.geo).forEach(([k,v])=>{
          const n=Number(k);
          if(GEO[n]){
            if(v.w!==undefined)GEO[n].w=v.w;
            if(v.h!==undefined)GEO[n].h=v.h;
          }
        });
      }
      if(saved.images){
        Object.keys(RACK_IMAGES).forEach(k=>{delete RACK_IMAGES[k];});
        Object.entries(saved.images).forEach(([k,v])=>{RACK_IMAGES[Number(k)]=v;});
      }
      saveToStorage();
      fullRerender();
    }catch(err){console.warn('import error',err);alert('Invalid settings file.');}
  };
  reader.readAsText(file);
  e.target.value='';
}

function fullRerender(){
  document.getElementById('rack-cells').innerHTML='';
  document.getElementById('badge-layer').innerHTML='';
  generateRackCells();
  renderRackLabels();
  renderRackImages();
  applyPickRoutes();
  setupClickHandlers();
}

// Boot
generateRackCells();
renderRackLabels();
renderRackImages();
renderCartLabels();
applyPickRoutes();
setupClickHandlers();
document.getElementById('em-save').addEventListener('click',saveEditModal);
document.getElementById('em-cancel').addEventListener('click',closeEditModal);
document.getElementById('em-reset').addEventListener('click',resetSlotToDefault);
document.getElementById('em-img').addEventListener('change',handleImageUpload);
document.getElementById('em-rm-img').addEventListener('click',removeImage);
// Fix: only close modal when BOTH mousedown and mouseup happen on the backdrop
(function(){
  const modal=document.getElementById('edit-modal');
  modal.addEventListener('mousedown',function(e){modalMouseDownOnBackdrop=(e.target===modal);});
  modal.addEventListener('mouseup',function(e){
    if(modalMouseDownOnBackdrop&&e.target===modal)closeEditModal();
    modalMouseDownOnBackdrop=false;
  });
})();
document.getElementById('btn-slots').addEventListener('click',openSlotPicker);
document.getElementById('sp-close').addEventListener('click',closeSlotPicker);
(function(){
  const picker=document.getElementById('slot-picker');
  let spMouseDown=false;
  picker.addEventListener('mousedown',function(e){spMouseDown=(e.target===picker);});
  picker.addEventListener('mouseup',function(e){
    if(spMouseDown&&e.target===picker)closeSlotPicker();
    spMouseDown=false;
  });
})();
document.getElementById('btn-export').addEventListener('click',exportSettings);
document.getElementById('btn-import').addEventListener('click',function(){
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change',importSettings);
document.getElementById('lu').textContent=new Date().toLocaleTimeString();
})();
</script>
